# GitHub Actions workflow for IBDGS Assignment 4
# Automatically builds and runs all tests on every push or pull request

name: Build and Test IBDGS

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Java 11
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # Step 3: Build the project and run all tests using Maven
      - name: Build and run tests with Maven
        run: mvn test

      # Step 4: Show test results summary
      - name: Test results
        if: always()
        run: echo "All tests completed."
